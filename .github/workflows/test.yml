name: Test

on:
  push:
  pull_request:

jobs:
  zsh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends zsh
      - name: Run plugin test suite
        run: zsh tests/run.zsh
      - name: Mutation-check the test harness
        run: zsh tests/test-the-test.zsh
